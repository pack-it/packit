[package]
name = "packit"
description = "The universal package manager."
version = "0.1.0"
edition = "2021"

[dependencies]
thiserror = "2.0.17"
serde = { version = "1.0.228", features = ["derive"] }
toml = "0.9.8"
clap = { version = "4.5.49", features = ["derive"] }
reqwest = { version = "0.12.24", features = ["blocking"] }
tar = "0.4.44"
flate2 = "1.1.4"
